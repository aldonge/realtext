<!-- Footer -->
<footer class="bg-slate-900 text-slate-400 py-12 px-5">
    <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center md:items-start justify-between gap-6">
        <div>
            <a href="/{{currentLang}}/" class="text-lg font-heading font-extrabold tracking-tight">
                <span class="text-white">Real</span><span class="text-blue-400">Text</span>
            </a>
            <p class="text-sm mt-1 text-slate-500">{{footer.tagline}}</p>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <a href="/app?lang={{currentLang}}" class="hover:text-white transition-colors">{{footer.links.tool}}</a>
            <a href="/{{currentLang}}/privacy.html" class="hover:text-white transition-colors">{{footer.links.privacy}}</a>
            <a href="/{{currentLang}}/terms.html" class="hover:text-white transition-colors">{{footer.links.terms}}</a>
            <a href="/{{currentLang}}/blog/" class="hover:text-white transition-colors">{{footer.links.blog}}</a>
        </div>
    </div>
    <div class="max-w-5xl mx-auto mt-8 pt-6 border-t border-slate-800 text-center text-xs text-slate-500">
        {{footer.copyright}}
    </div>
</footer>
