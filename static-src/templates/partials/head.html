    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">

    <!-- SEO Primary -->
    <title>{{pageTitle}}</title>
    <meta name="description" content="{{pageDescription}}">
    <link rel="canonical" href="https://realtext.org/{{currentLang}}/{{currentPath}}">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ogTitle}}">
    <meta property="og:description" content="{{ogDescription}}">
    <meta property="og:url" content="https://realtext.org/{{currentLang}}/{{currentPath}}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="RealText">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ogTitle}}">
    <meta name="twitter:description" content="{{ogDescription}}">

    <!-- hreflang -->
    {{hreflangTags}}

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: { DEFAULT: '#2563EB', hover: '#1D4ED8', light: '#EFF6FF' },
            slate: {
              50: '#F8FAFC', 100: '#F1F5F9', 200: '#E2E8F0', 300: '#CBD5E1',
              400: '#94A3B8', 500: '#64748B', 600: '#475569', 700: '#334155',
              800: '#1E293B', 900: '#0F172A'
            }
          },
          fontFamily: {
            heading: ['"Plus Jakarta Sans"', 'sans-serif'],
            body: ['"Inter"', 'sans-serif'],
          }
        }
      }
    }
    </script>

    <!-- Shared CSS -->
    <link rel="stylesheet" href="/shared/styles.css">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .cursor-blink { animation: blink 1s step-end infinite; }
        html { scroll-behavior: smooth; }
    </style>
