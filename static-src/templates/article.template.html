<!DOCTYPE html>
<html lang="{{currentLang}}">
<head>
{{> article-head}}

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "{{article.title}}",
        "description": "{{article.description}}",
        "url": "https://realtext.org/{{currentLang}}/blog/{{article.slug}}.html",
        "datePublished": "{{article.date}}",
        "dateModified": "{{article.date}}",
        "inLanguage": "{{currentLang}}",
        "publisher": {
            "@type": "Organization",
            "name": "RealText",
            "url": "https://realtext.org"
        },
        "author": {
            "@type": "Organization",
            "name": "RealText"
        }
    }
    </script>
</head>
<body>

<div class="nav">
    <a href="/{{currentLang}}/" class="logo">
        <span>Real</span><span class="accent">Text</span><span class="cursor-blink">_</span>
    </a>
    <div class="lang-switcher">
        <a href="{{languageLinks.en}}" class="lang-btn{{#if isEn}} active{{/if}}">EN</a>
        <a href="{{languageLinks.it}}" class="lang-btn{{#if isIt}} active{{/if}}">IT</a>
        <a href="{{languageLinks.es}}" class="lang-btn{{#if isEs}} active{{/if}}">ES</a>
        <a href="{{languageLinks.de}}" class="lang-btn{{#if isDe}} active{{/if}}">DE</a>
        <a href="{{languageLinks.fr}}" class="lang-btn{{#if isFr}} active{{/if}}">FR</a>
        <a href="{{languageLinks.pt}}" class="lang-btn{{#if isPt}} active{{/if}}">PT</a>
    </div>
</div>

<article class="container">
    {{article.bodyHtml}}

    <!-- Related articles -->
    {{#if relatedArticles.length}}
    <section class="related">
        <h2>{{blog.readMore}}</h2>
        <ul>
            {{#each relatedArticles}}
            <li><a href="/{{lang}}/blog/{{slug}}.html">{{title}}</a></li>
            {{/each}}
        </ul>
    </section>
    {{/if}}
</article>

<footer>
    <div style="margin-bottom: 16px;">
        <a href="/{{currentLang}}/">Home</a>
        <a href="/app">Tool</a>
        <a href="/{{currentLang}}/privacy.html">Privacy</a>
        <a href="/{{currentLang}}/terms.html">Terms</a>
    </div>
    <p>&copy; 2026 RealText</p>
</footer>

</body>
</html>
