<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <title>RealText — AI Detector & Humanizer</title>
    <meta name="description" content="Free AI text detector and humanizer. Detect ChatGPT, GPT-5, Gemini, Claude and more. Available in English, Italiano, Español, Deutsch, Français, Português.">
    <link rel="canonical" href="https://realtext.org/">

    <!-- Open Graph -->
    <meta property="og:title" content="RealText — AI Detector & Humanizer">
    <meta property="og:description" content="Free AI text detector and humanizer. Multilingual, no signup required.">
    <meta property="og:url" content="https://realtext.org/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="RealText">

    <!-- hreflang -->
    <link rel="alternate" hreflang="en" href="https://realtext.org/en/">
    <link rel="alternate" hreflang="it" href="https://realtext.org/it/">
    <link rel="alternate" hreflang="es" href="https://realtext.org/es/">
    <link rel="alternate" hreflang="de" href="https://realtext.org/de/">
    <link rel="alternate" hreflang="fr" href="https://realtext.org/fr/">
    <link rel="alternate" hreflang="pt" href="https://realtext.org/pt/">
    <link rel="alternate" hreflang="x-default" href="https://realtext.org/en/">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #FFFFFF; color: #0F172A; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        h1, h2 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .logo { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 2rem; margin-bottom: 24px; }
        .logo .accent { color: #2563EB; }
        .langs { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 24px 0; }
        .langs a { color: #2563EB; text-decoration: none; font-weight: 500; font-size: 1rem; padding: 8px 16px; border: 1px solid #E2E8F0; border-radius: 8px; transition: all 0.2s; }
        .langs a:hover { background: #EFF6FF; border-color: #2563EB; }
        .tagline { color: #64748B; font-size: 0.95rem; text-align: center; line-height: 1.6; max-width: 480px; margin-top: 16px; }
        noscript { color: #94A3B8; font-size: 0.85rem; margin-top: 16px; }
    </style>
</head>
<body>

    <div class="logo"><span>Real</span><span class="accent">Text</span></div>

    <div class="langs">
        <a href="/en/">English</a>
        <a href="/it/">Italiano</a>
        <a href="/es/">Español</a>
        <a href="/de/">Deutsch</a>
        <a href="/fr/">Français</a>
        <a href="/pt/">Português</a>
    </div>

    <p class="tagline">
        Free AI text detector and humanizer.<br>
        Detector AI e humanizer gratuito.<br>
        Detector de IA y humanizador gratuito.
    </p>

    <noscript>Choose your language above / Scegli la tua lingua / Elige tu idioma</noscript>

    <script>
    (function() {
        var supported = ['en', 'it', 'es', 'de', 'fr', 'pt'];
        var langs = navigator.languages || [navigator.language || 'en'];
        var lang = 'en';
        for (var i = 0; i < langs.length; i++) {
            var code = langs[i].substring(0, 2).toLowerCase();
            if (supported.indexOf(code) !== -1) {
                lang = code;
                break;
            }
        }
        window.location.replace('/' + lang + '/');
    })();
    </script>

</body>
</html>
