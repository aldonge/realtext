<!DOCTYPE html>
<html lang="{{currentLang}}">
<head>
{{> legal-head}}
</head>
<body>

<div class="nav">
    <a href="/{{currentLang}}/" class="logo">
        <span>Real</span><span class="accent">Text</span><span class="cursor-blink">_</span>
    </a>
    <div class="lang-switcher">
        <a href="/en/{{currentPath}}" class="lang-btn{{#if isEn}} active{{/if}}">EN</a>
        <a href="/it/{{currentPath}}" class="lang-btn{{#if isIt}} active{{/if}}">IT</a>
        <a href="/es/{{currentPath}}" class="lang-btn{{#if isEs}} active{{/if}}">ES</a>
        <a href="/de/{{currentPath}}" class="lang-btn{{#if isDe}} active{{/if}}">DE</a>
        <a href="/fr/{{currentPath}}" class="lang-btn{{#if isFr}} active{{/if}}">FR</a>
        <a href="/pt/{{currentPath}}" class="lang-btn{{#if isPt}} active{{/if}}">PT</a>
    </div>
</div>

<div class="container">
    <h1>{{legalTitle}}</h1>
    <p class="meta">{{legalLastUpdated}}</p>

    {{#each legalSections}}
    <h2>{{heading}}</h2>
    <div>{{body}}</div>
    {{/each}}
</div>

<footer>
    <div style="margin-bottom: 16px;">
        <a href="/{{currentLang}}/">Home</a>
        <a href="/app">Tool</a>
        <a href="/{{currentLang}}/privacy.html">Privacy</a>
        <a href="/{{currentLang}}/terms.html">Terms</a>
    </div>
    <p>&copy; 2026 RealText</p>
</footer>

</body>
</html>
