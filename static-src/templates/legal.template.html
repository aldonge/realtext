<!DOCTYPE html>
<html lang="{{currentLang}}">
<head>
{{> head}}
</head>
<body class="bg-white text-slate-900 antialiased">

{{> header}}

<div class="max-w-[720px] mx-auto px-5 pt-28 pb-16">
    <h1 class="font-heading font-extrabold text-2xl md:text-3xl text-slate-900 mb-4">{{legalTitle}}</h1>
    <p class="text-slate-400 text-sm mb-10">{{legalLastUpdated}}</p>

    {{#each legalSections}}
    <h2 class="font-heading font-bold text-lg md:text-xl text-slate-900 mt-10 mb-3">{{heading}}</h2>
    <div class="text-slate-600 leading-relaxed [&_p]:mb-4 [&_ul]:mb-4 [&_ul]:ml-6 [&_li]:mb-2 [&_strong]:text-slate-900">{{body}}</div>
    {{/each}}
</div>

{{> footer}}

</body>
</html>
