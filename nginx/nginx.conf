server {
    listen 80;
    server_name realtext.org www.realtext.org _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/html;
    gzip_min_length 1000;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri @spa;
    }

    # === 301 redirects from old URLs (preserve SEO equity) ===

    # Old IT blog articles
    location = /blog/come-capire-testo-ai.html {
        return 301 /it/blog/come-capire-testo-ai.html;
    }
    location = /blog/segnali-testo-chatgpt.html {
        return 301 /it/blog/segnali-testo-chatgpt.html;
    }
    location = /blog/rendere-testo-ai-naturale.html {
        return 301 /it/blog/rendere-testo-ai-naturale.html;
    }
    location = /blog/ai-detection-cosa-funziona.html {
        return 301 /it/blog/ai-detection-cosa-funziona.html;
    }
    location = /blog/studenti-ai-plagio.html {
        return 301 /it/blog/studenti-ai-plagio.html;
    }

    # Old EN blog articles
    location = /blog/humanize-ai-text-free.html {
        return 301 /en/blog/humanize-ai-text-free.html;
    }
    location = /blog/make-chatgpt-text-undetectable.html {
        return 301 /en/blog/make-chatgpt-text-undetectable.html;
    }
    location = /blog/bypass-ai-detection.html {
        return 301 /en/blog/bypass-ai-detection.html;
    }
    location = /blog/check-if-text-is-ai-generated.html {
        return 301 /en/blog/check-if-text-is-ai-generated.html;
    }
    location = /blog/ai-content-detector-free.html {
        return 301 /en/blog/ai-content-detector-free.html;
    }
    location = /blog/ai-vs-human-writing.html {
        return 301 /en/blog/ai-vs-human-writing.html;
    }
    location = /blog/free-ai-detection-reliable.html {
        return 301 /en/blog/free-ai-detection-reliable.html;
    }
    location = /blog/make-ai-text-natural.html {
        return 301 /en/blog/make-ai-text-natural.html;
    }

    # Old root pages → /en/
    location = /privacy.html { return 301 /en/privacy.html; }
    location = /terms.html { return 301 /en/terms.html; }
    location = /privacy { return 301 /en/privacy.html; }
    location = /terms { return 301 /en/terms.html; }

    # Old blog index
    location = /blog/ { return 301 /en/blog/; }
    location = /blog { return 301 /en/blog/; }

    # === Root: serve router (NO server-side redirect) ===
    location = / {
        root /usr/share/nginx/static;
        try_files /index.html =404;
    }

    # === Static assets condivisi ===
    location ^~ /shared/ {
        alias /usr/share/nginx/html/shared/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # === Sitemap e robots ===
    location = /sitemap.xml {
        root /usr/share/nginx/static;
        try_files /sitemap.xml =404;
        add_header Content-Type "application/xml; charset=utf-8";
    }
    location = /robots.txt {
        root /usr/share/nginx/static;
        try_files /robots.txt =404;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # === Lingue: serve direttamente ===
    location ~ ^/(en|it|es|de|fr|pt)/ {
        root /usr/share/nginx/static;
        try_files $uri $uri/ $uri.html =404;
    }

    # === API proxy — NON TOCCARE ===
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # === /app → SPA React — NON TOCCARE ===
    location /app {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location @spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Default: try static first, then SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
