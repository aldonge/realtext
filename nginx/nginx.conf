server {
    listen 80;
    server_name realtext.org www.realtext.org _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/html;
    gzip_min_length 1000;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri @spa;
    }

    # SEO-critical static files (served BEFORE SPA)
    location = / {
        root /usr/share/nginx/static;
        try_files /index.html =404;
    }

    location = /robots.txt {
        root /usr/share/nginx/static;
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        root /usr/share/nginx/static;
        try_files /sitemap.xml =404;
    }

    location /blog/ {
        root /usr/share/nginx/static;
        try_files $uri $uri/ =404;
    }

    location = /privacy {
        root /usr/share/nginx/static;
        try_files /privacy.html =404;
    }

    location = /terms {
        root /usr/share/nginx/static;
        try_files /terms.html =404;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # React SPA (catch-all for /app and everything else)
    location /app {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location @spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Default: try static first, then SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
