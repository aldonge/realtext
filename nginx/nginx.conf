server {
    listen 80;
    server_name realtext.org www.realtext.org _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/html;
    gzip_min_length 1000;

    # ═══════════════════════════════════════════════════════
    # 301 redirects from old URLs (preserve SEO equity)
    # ═══════════════════════════════════════════════════════

    # Old IT blog articles
    location = /blog/come-capire-testo-ai.html {
        return 301 https://realtext.org/it/blog/come-capire-testo-ai.html;
    }
    location = /blog/segnali-testo-chatgpt.html {
        return 301 https://realtext.org/it/blog/segnali-testo-chatgpt.html;
    }
    location = /blog/rendere-testo-ai-naturale.html {
        return 301 https://realtext.org/it/blog/rendere-testo-ai-naturale.html;
    }
    location = /blog/ai-detection-cosa-funziona.html {
        return 301 https://realtext.org/it/blog/ai-detection-cosa-funziona.html;
    }
    location = /blog/studenti-ai-plagio.html {
        return 301 https://realtext.org/it/blog/studenti-ai-plagio.html;
    }

    # Old EN blog articles
    location = /blog/humanize-ai-text-free.html {
        return 301 https://realtext.org/en/blog/humanize-ai-text-free.html;
    }
    location = /blog/make-chatgpt-text-undetectable.html {
        return 301 https://realtext.org/en/blog/make-chatgpt-text-undetectable.html;
    }
    location = /blog/bypass-ai-detection.html {
        return 301 https://realtext.org/en/blog/bypass-ai-detection.html;
    }
    location = /blog/check-if-text-is-ai-generated.html {
        return 301 https://realtext.org/en/blog/check-if-text-is-ai-generated.html;
    }
    location = /blog/ai-content-detector-free.html {
        return 301 https://realtext.org/en/blog/ai-content-detector-free.html;
    }
    location = /blog/ai-vs-human-writing.html {
        return 301 https://realtext.org/en/blog/ai-vs-human-writing.html;
    }
    location = /blog/free-ai-detection-reliable.html {
        return 301 https://realtext.org/en/blog/free-ai-detection-reliable.html;
    }
    location = /blog/make-ai-text-natural.html {
        return 301 https://realtext.org/en/blog/make-ai-text-natural.html;
    }

    # Old root pages → /en/
    location = /privacy.html { return 301 https://realtext.org/en/privacy.html; }
    location = /terms.html { return 301 https://realtext.org/en/terms.html; }
    location = /privacy { return 301 https://realtext.org/en/privacy.html; }
    location = /terms { return 301 https://realtext.org/en/terms.html; }

    # Old blog index
    location = /blog/ { return 301 https://realtext.org/en/blog/; }
    location = /blog { return 301 https://realtext.org/en/blog/; }

    # ═══════════════════════════════════════════════════════
    # Root: multilingual router (static HTML)
    # ═══════════════════════════════════════════════════════
    location = / {
        root /usr/share/nginx/static;
        try_files /index.html =404;
    }

    # ═══════════════════════════════════════════════════════
    # Multilingual static pages: /en/, /it/, /es/, /de/, /fr/, /pt/
    # ═══════════════════════════════════════════════════════
    location ~ ^/(en|it|es|de|fr|pt)(/|$) {
        root /usr/share/nginx/static;
        try_files $uri $uri/ $uri.html =404;
    }

    # ═══════════════════════════════════════════════════════
    # Shared CSS for articles and legal pages
    # ═══════════════════════════════════════════════════════
    location ^~ /shared/ {
        alias /usr/share/nginx/static/shared/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ═══════════════════════════════════════════════════════
    # Sitemap and robots (from static/)
    # ═══════════════════════════════════════════════════════
    location = /sitemap.xml {
        root /usr/share/nginx/static;
        try_files /sitemap.xml =404;
        add_header Content-Type "application/xml; charset=utf-8";
    }
    location = /robots.txt {
        root /usr/share/nginx/static;
        try_files /robots.txt =404;
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # ═══════════════════════════════════════════════════════
    # API proxy (backend FastAPI)
    # ═══════════════════════════════════════════════════════
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ═══════════════════════════════════════════════════════
    # SPA React: ONLY /app and /app/ (exact/trailing slash)
    # React Router handles client-side routing inside the SPA
    # ═══════════════════════════════════════════════════════
    location = /app {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
    location = /app/ {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # SPA bundles: JS/CSS/map/img/font files only
    location ~ ^/assets/.+\.(js|css|map|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|otf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA static files: favicon, manifest, etc.
    location ~ ^/(favicon\.svg|favicon\.ico|manifest\.json|site\.webmanifest)$ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # ═══════════════════════════════════════════════════════
    # Catch-all: 404 for everything else
    # NO fallback to SPA, NO fallback to anything
    # ═══════════════════════════════════════════════════════
    location / {
        return 404;
    }
}
